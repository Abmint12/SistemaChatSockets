<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatRT · Sala</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="chat-body">
  <div class="chat-layout">
    <!-- Barra lateral: usuarios conectados -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="brand-logo small">⚡</span>
        <div>
          <strong>ChatRT</strong>
          <div class="conn-state" id="conn-state">Conectando…</div>
        </div>
      </div>

      <div class="users-title">
        Conectados <span class="badge" id="users-count">0</span>
      </div>
      <ul class="users-list" id="users-list"></ul>

      <div class="sidebar-foot">
        <div class="me">
          <div class="avatar" id="me-avatar">?</div>
          <span id="me-name">—</span>
        </div>
        <button class="btn-logout" id="btn-logout" type="button">Salir</button>
      </div>
    </aside>

    <!-- Panel principal: mensajes -->
    <section class="main-panel">
      <header class="chat-header">
        <h2># sala-general</h2>
        <span class="typing" id="typing-indicator"></span>
      </header>

      <div class="messages" id="messages"></div>

      <form class="composer" id="composer">
        <input
          type="text"
          id="msg-input"
          placeholder="Escribe un mensaje…"
          autocomplete="off"
          maxlength="1000"
          required
        />
        <button class="btn-send" type="submit">Enviar</button>
      </form>
    </section>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
